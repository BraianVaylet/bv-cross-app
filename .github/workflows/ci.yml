name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Cache de turbo: acelera lint/typecheck/test/build entre corridas
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      # Cache del binario de mongod (mongodb-memory-server): evita re-bajarlo
      # cada corrida y, junto al prewarm, mata la carrera de descarga.
      - uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}

      - run: pnpm install --frozen-lockfile

      # Prewarm secuencial: baja el binario en un solo proceso antes de que
      # las suites de test lo pidan en paralelo (ver scripts/prewarm-mongo.mts).
      - run: pnpm --filter @bv/api exec tsx scripts/prewarm-mongo.mts

      - run: pnpm turbo run lint typecheck test build

      # Auditoría de dependencias (docs/05-seguridad.md §5): falla con high+ en prod deps
      - run: pnpm audit --prod --audit-level=high

      - name: osv-scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: --lockfile=pnpm-lock.yaml
